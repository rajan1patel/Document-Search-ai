services:


  backend:

    build:
      context: ./backend

    container_name: document_backend


    ports:
      - "8000:8000"


    env_file:
      - ./backend/.env


    depends_on:
      - postgres
      - milvus



    volumes:
      - ./backend:/app



  postgres:

    image: postgres:16


    container_name: document_postgres


    environment:

      POSTGRES_USER: document_user

      POSTGRES_PASSWORD: password

      POSTGRES_DB: document_db


    ports:

      - "5432:5432"


    volumes:

      - postgres_data:/var/lib/postgresql/data





  etcd:

    image: quay.io/coreos/etcd:v3.5.5


    environment:

      ETCD_AUTO_COMPACTION_MODE: revision

      ETCD_AUTO_COMPACTION_RETENTION: "1000"





  minio:

    image: minio/minio


    environment:

      MINIO_ROOT_USER: minio

      MINIO_ROOT_PASSWORD: minio123


    command:

      server /data





  milvus:


    image: milvusdb/milvus:v2.4.0


    container_name: document_milvus


    command:

      - milvus

      - run

      - standalone


    ports:

      - "19530:19530"


    depends_on:

      - etcd

      - minio





volumes:

  postgres_data: