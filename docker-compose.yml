services:


  frontend:

    build:
      context: ./frontend

    container_name: document_frontend

    ports:
      - "3000:3000"

    environment:
      NUXT_PUBLIC_API_BASE: http://localhost:8000

    depends_on:
      - backend


  backend:

    build:
      context: ./backend

    restart: unless-stopped

    container_name: document_backend


    ports:
      - "8000:8000"


    env_file:
      - ./backend/.env

    environment:
      DATABASE_URL: postgresql+asyncpg://document_user:password@postgres:5432/document_db
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530


    depends_on:
      postgres:
        condition: service_healthy
      milvus:
        condition: service_started



    volumes:
      - ./backend:/app



  postgres:

    image: postgres:16

    restart: unless-stopped

    container_name: document_postgres


    environment:

      POSTGRES_USER: document_user

      POSTGRES_PASSWORD: password

      POSTGRES_DB: document_db


    ports:

      - "5432:5432"


    volumes:

      - postgres_data:/var/lib/postgresql/data

    healthcheck:

      test: ["CMD-SHELL", "pg_isready -U document_user -d document_db"]

      interval: 5s

      timeout: 3s

      retries: 10





  etcd:

    image: quay.io/coreos/etcd:v3.5.5

    restart: unless-stopped

    container_name: document_etcd

    environment:

      ETCD_AUTO_COMPACTION_MODE: revision

      ETCD_AUTO_COMPACTION_RETENTION: "1000"

      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379

      ETCD_ADVERTISE_CLIENT_URLS: http://etcd:2379

    healthcheck:

      test: ["CMD", "etcdctl", "endpoint", "health"]

      interval: 5s

      timeout: 3s

      retries: 10





  minio:

    image: minio/minio

    restart: unless-stopped

    container_name: document_minio

    environment:

      MINIO_ROOT_USER: minioadmin

      MINIO_ROOT_PASSWORD: minioadmin


    command:

      server /data --console-address ":9001"

    healthcheck:

      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]

      interval: 5s

      timeout: 3s

      retries: 10





  milvus:


    image: milvusdb/milvus:v2.4.0


    container_name: document_milvus

    restart: unless-stopped

    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin


    command:

      - milvus

      - run

      - standalone


    ports:

      - "19530:19530"


    depends_on:

      etcd:
        condition: service_healthy

      minio:
        condition: service_healthy





volumes:

  postgres_data:
